<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 650" style="background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif;">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
        </filter>

        <linearGradient id="gradPath" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#8b5cf6" />
        </linearGradient>

        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>

        <!-- Node Gradients -->
        <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#334155" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#1e293b" stop-opacity="0.9" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#bg)" />

    <!-- Swimlanes -->
    <rect x="30" y="30" width="260" height="590" rx="20" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="2" />
    <text x="160" y="70" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">SOURCE SYSTEMS</text>

    <rect x="330" y="30" width="260" height="590" rx="20" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="2" />
    <text x="460" y="70" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">INGESTION</text>

    <rect x="630" y="30" width="260" height="590" rx="20" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="2" />
    <text x="760" y="70" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">STORAGE</text>

    <rect x="930" y="30" width="260" height="590" rx="20" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="2" />
    <text x="1060" y="70" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">BI &amp; ANALYTICS</text>

    <!-- Paths -->
    <g fill="none" stroke-width="3">
        <g stroke="url(#gradPath)" marker-end="url(#arrow)">
            <path d="M 270 160 C 310 160, 310 160, 350 160" />
            <path d="M 270 410 C 310 410, 310 330, 350 330" />
            <path d="M 270 410 C 310 410, 310 490, 350 490" />
            
            <path d="M 570 160 C 610 160, 610 300, 650 300" />
            <path d="M 570 330 C 610 330, 610 300, 650 300" />
            <path d="M 570 490 C 610 490, 610 490, 650 490" />
            
            <path d="M 870 300 C 910 300, 910 160, 950 160" />
            <path d="M 870 300 C 910 300, 910 330, 950 330" />
        </g>
        
        <path d="M 870 490 C 910 490, 910 490, 950 490" stroke="#22c55e" stroke-dasharray="8,6" marker-end="url(#arrowGreen)" />
        <path d="M 1060 200 L 1060 280" stroke="#ef4444" stroke-dasharray="8,6" marker-end="url(#arrowRed)" />
    </g>

    <!-- Cards Source -->
    <g transform="translate(50, 120)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#22c55e" fill-opacity="0.15" />
        <!-- Extracted from feather icons: FileText -->
        <g transform="translate(26, 26)" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">Excel Historical</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">1980-2025 Data</text>
    </g>

    <g transform="translate(50, 370)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#8b5cf6" fill-opacity="0.15" />
        <!-- Activity -->
        <g transform="translate(26, 26)" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">Yahoo Finance</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">Daily API Live</text>
    </g>

    <!-- Cards Ingestion -->
    <g transform="translate(350, 120)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#f59e0b" fill-opacity="0.15" />
        <!-- Terminal -->
        <g transform="translate(26, 26)" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"></polyline>
            <line x1="12" y1="19" x2="20" y2="19"></line>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">Initial Load</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">Data Cleaning</text>
    </g>

    <g transform="translate(350, 290)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#3b82f6" fill-opacity="0.15" />
        <!-- Code -->
        <g transform="translate(26, 26)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">Python Daemon</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">yf_update.py</text>
    </g>

    <g transform="translate(350, 450)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#f8fafc" fill-opacity="0.15" />
        <!-- Settings -->
        <g transform="translate(26, 26)" stroke="#f8fafc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">GitHub Actions</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">gh_update_csv.py</text>
    </g>

    <!-- Cards Storage -->
    <g transform="translate(650, 260)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#0ea5e9" fill-opacity="0.15" />
        <!-- Database -->
        <g transform="translate(26, 26)" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">MySQL Database</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">Fact &amp; Dim Tables</text>
    </g>

    <g transform="translate(650, 450)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#f8fafc" fill-opacity="0.15" />
        <!-- Folder -->
        <g transform="translate(26, 26)" stroke="#f8fafc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">GitHub Repository</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">aapl_daily.csv</text>
    </g>

    <!-- Cards BI -->
    <g transform="translate(950, 120)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#eab308" fill-opacity="0.15" />
        <!-- Server -->
        <g transform="translate(26, 26)" stroke="#eab308" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line>
            <line x1="6" y1="18" x2="6.01" y2="18"></line>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">PowerBI Gateway</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">On-premises Sync</text>
    </g>

    <g transform="translate(950, 290)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#eab308" fill-opacity="0.15" />
        <!-- Bar Chart -->
        <g transform="translate(26, 26)" stroke="#eab308" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">PowerBI Cloud</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">Cloud to Local</text>
    </g>

    <g transform="translate(950, 450)" filter="url(#shadow)">
        <rect width="220" height="80" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
        <rect x="15" y="15" width="50" height="50" rx="10" fill="#eab308" fill-opacity="0.15" />
        <!-- Globe -->
        <g transform="translate(26, 26)" stroke="#eab308" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </g>
        <text x="75" y="40" fill="#f8fafc" font-size="15" font-weight="600">PowerBI Web</text>
        <text x="75" y="60" fill="#94a3b8" font-size="12">Direct to GitHub</text>
    </g>

</svg>
